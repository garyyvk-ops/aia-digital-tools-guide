<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c8102e">
  <title>AIA Digital Tools Guide</title>
  <link rel="stylesheet" href="styles.css">
  <script src="course-data.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar">
    <button class="icon-button menu-button" id="menuButton" type="button" aria-label="Open course menu" title="Course menu">☰</button>
    <a class="brand" href="#/" aria-label="Course home">
      <img id="brandLogo" alt="">
      <span id="brandTitle">AIA Digital Tools Guide</span>
    </a>
    <div class="topbar-actions">
      <button class="icon-button" id="searchButton" type="button" aria-label="Search course" title="Search">⌕</button>
      <div class="progress-summary" aria-label="Course progress">
        <span id="progressText">0%</span>
        <span class="progress-track"><span id="progressBar"></span></span>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Course contents">
      <div class="sidebar-head">
        <strong>Contents</strong>
        <button class="icon-button close-menu" id="closeMenu" type="button" aria-label="Close course menu">×</button>
      </div>
      <nav id="lessonNav"></nav>
    </aside>
    <div class="scrim" id="scrim"></div>
    <main id="main" tabindex="-1"></main>
  </div>

  <dialog class="search-dialog" id="searchDialog">
    <form method="dialog" class="dialog-head">
      <label for="searchInput">Search this course</label>
      <button class="icon-button" type="submit" aria-label="Close search">×</button>
    </form>
    <input id="searchInput" type="search" placeholder="Search tools, actions, or topics" autocomplete="off">
    <div id="searchResults" class="search-results" aria-live="polite"></div>
  </dialog>

  <dialog class="image-dialog" id="imageDialog">
    <button class="image-close" id="imageClose" type="button" aria-label="Close enlarged image">×</button>
    <img id="dialogImage" alt="">
    <p id="dialogCaption"></p>
  </dialog>
</body>
</html>
